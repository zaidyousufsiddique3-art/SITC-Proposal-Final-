
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SITC — Travel Proposal Portal</title>
    <meta name="description" content="Create professional corporate travel proposals in minutes. Designed for travel teams to build, manage, and deliver premium experiences." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ai: {
                bg: '#05060A',
                card: '#101726',
                surface: '#0B0F1A',
                accent: '#0a62f0',
                secondary: '#5fa9ff',
                text: '#FFFFFF',
                muted: 'rgba(255,255,255,0.45)',
              },
              corporate: {
                blue: '#0c4a6e',
                accent: '#0ea5e9',
                gold: '#d4af37',
                light: '#f0f9ff'
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Montserrat', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              'xl': '12px',
              '2xl': '16px',
              '3xl': '20px',
            },
            boxShadow: {
              'glow': '0 0 30px -5px rgba(10,98,240,0.25)',
              'glow-lg': '0 0 60px -10px rgba(10,98,240,0.35)',
              'soft': '0 4px 32px rgba(0,0,0,0.3)',
              'card': '0 8px 40px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.05)',
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'fade-up': 'fadeUp 0.6s ease-out forwards',
              'slide-up': 'slideUp 0.4s ease-out forwards',
              'pulse-slow': 'pulse 3s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(16px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-ai-bg text-ai-text antialiased selection:bg-ai-accent/30 selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
